<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Text Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
  <style>
 
    .fire-text {
      font-family: 'Roboto', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #ff4e00; /* base orange */
      text-align: center;
      animation: fire 1.5s infinite alternate;
    }

    @keyframes fire {
      0% {
        text-shadow: 
          0 0 5px #ff6a00,
          0 0 10px #ff6a00,
          0 0 20px #ff0000;
        color: #ffae00;
      }
      50% {
        text-shadow: 
          0 0 10px #ffae00,
          0 0 20px #ff4500,
          0 0 30px #ff0000,
          0 0 40px #ff0000;
        color: #fff200;
      }
      100% {
        text-shadow: 
          0 0 5px #ff6a00,
          0 0 15px #ff0000,
          0 0 25px #ff4500,
          0 0 35px #ff0000;
        color: #ff6a00;
      }
    }
  </style>
</head>
<body>
  <p class="fire-text"> Try our game! Now available in mobile version </p>
</body>
</html>
