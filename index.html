<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fire Text Animation</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@900&display=swap" rel="stylesheet">
  <style>
 
    .fire-text {
      font-family: 'Roboto', sans-serif;
      font-size: 48px;
      font-weight: 900;
      color: #ff4e00; /* base orange */
      text-align: center;
      animation: fire 1.5s infinite alternate;
    }

  @keyframes fire {
  0% {
    text-shadow: 0 0 4px #ffae00;
    color: #ffae00; /* bright yellow */
  }
  50% {
    text-shadow: 0 0 8px #ff6a00;
    color: #fff200; /* yellow */
  }
  100% {
    text-shadow: 0 0 6px #ff6a00;
    color: #ff6a00; /* orange */
  }
}


  </style>
</head>
<body>
  <p class="fire-text"> Try our game! Now available in mobile version </p>
</body>
</html>
