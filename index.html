<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Responsive Bouncing Circle</title>
<style>
  :root {
    --rect-height-ratio: 0.8; /* default rectangle height ratio */
  }

  @media (max-width: 700px) {
    :root {
      --rect-height-ratio: 0.5; /* smaller rectangle height on small screens */
    }
  }

  html, body { 
    margin: 0; 
    height: 100%;
  }

  canvas { 
    max-width: 800px;
    display: inline-block; /* required for text-align centering */
    width: 90vw;
    height: 60vh;
    vertical-align: middle; /* optional */
  }

  .canvas-wrapper567 {
    text-align: center; /* centers canvas horizontally */
    width: 100%;
   
    
  
  
  
  }
</style>
</head>
<body>

<div class="canvas-wrapper567">
  <canvas id="c"></canvas>
</div>



<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  const ball = { r: 24, speed: 240, x: 0, y: 0, vx: 0, vy: 0 };
  const rect = { x: 0, y: 0, w: 0, h: 0 };

  const rand = (min, max) => Math.random() * (max - min) + min;

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    const cssW = canvas.clientWidth;
    const cssH = canvas.clientHeight;
    canvas.width = cssW * dpr;
    canvas.height = cssH * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Get rectangle height ratio from CSS variable
    const rectHeightRatio = parseFloat(getComputedStyle(document.documentElement)
                                       .getPropertyValue('--rect-height-ratio'));

    rect.w = cssW * 0.8;
    rect.h = cssH * rectHeightRatio;
    rect.x = (cssW - rect.w) / 2;
    rect.y = (cssH - rect.h) / 2;

    // Keep ball inside rectangle
    ball.x = Math.min(Math.max(ball.x, rect.x + ball.r), rect.x + rect.w - ball.r);
    ball.y = Math.min(Math.max(ball.y, rect.y + ball.r), rect.y + rect.h - ball.r);
  }

  function initBall() {
    ball.x = rand(rect.x + ball.r, rect.x + rect.w - ball.r);
    ball.y = rand(rect.y + ball.r, rect.y + rect.h - ball.r);
    const angle = rand(0, Math.PI * 2);
    ball.vx = Math.cos(angle) * ball.speed;
    ball.vy = Math.sin(angle) * ball.speed;
  }

  function jitterVelocity(signX = 1, signY = 1) {
    const speed = ball.speed;
    let angle = Math.atan2(ball.vy, ball.vx);
    angle += rand(-0.5, 0.5);
    ball.vx = Math.cos(angle) * speed * signX;
    ball.vy = Math.sin(angle) * speed * signY;
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Draw rectangle background
    ctx.fillStyle = '#626F47';
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);

    // Draw rectangle border
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'black';
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);

    // Draw ball
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fillStyle = '#F26B0F';
    ctx.fill();
    ctx.strokeStyle = '#F26B0F';
    ctx.stroke();
  }

  let lastT = performance.now();
  function tick(now) {
    const dt = Math.min((now - lastT) / 1000, 0.05);
    lastT = now;

    ball.x += ball.vx * dt;
    ball.y += ball.vy * dt;

    let hitX = false, hitY = false;

    if (ball.x - ball.r <= rect.x) { ball.x = rect.x + ball.r; hitX = true; }
    else if (ball.x + ball.r >= rect.x + rect.w) { ball.x = rect.x + rect.w - ball.r; hitX = true; }

    if (ball.y - ball.r <= rect.y) { ball.y = rect.y + ball.r; hitY = true; }
    else if (ball.y + ball.r >= rect.y + rect.h) { ball.y = rect.y + rect.h - ball.r; hitY = true; }

    if (hitX && hitY) jitterVelocity(-1, -1);
    else if (hitX) jitterVelocity(-1, 1);
    else if (hitY) jitterVelocity(1, -1);

    draw();
    requestAnimationFrame(tick);
  }

  window.addEventListener('resize', resize);

  resize();
  initBall();
  requestAnimationFrame(tick);
})();
</script>



<script>
const wrapper2345 = document.querySelector('.canvas-wrapper567');

// HSL hue values for blue and green
const minHue = 180; // blue
const maxHue = 120; // green
let hue = minHue;
let direction = -1; // -1 = decreasing hue, 1 = increasing hue

function animateBackground() {
  // Move hue smoothly
  hue += 0.2 * direction; // smaller number = slower transition

  // Reverse direction at min/max
  if (hue <= maxHue) direction = 1;
  if (hue >= minHue) direction = -1;

  // Apply gradient
  wrapper2345.style.background = `linear-gradient(135deg, hsl(${hue}, 70%, 50%), hsl(${hue + 40}, 70%, 50%))`;

  requestAnimationFrame(animateBackground);
}

animateBackground();
</script>




</body>
</html>
