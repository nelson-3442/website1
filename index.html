<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Touch Button Example</title>
  <style>
    #myBtn {
      padding: 20px 40px;
      font-size: 20px;
      border: none;
      border-radius: 12px;
      background: #3498db;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }
  </style>
</head>
<body>

  <button id="myBtn">Touch me</button>

  <script>
    const btn = document.getElementById("myBtn");

    // finger down (touchstart)
    btn.addEventListener("touchstart", () => {
      btn.style.background = "#2ecc71"; // green
      btn.textContent = "Holding...";
    });

    // finger up (touchend)
    btn.addEventListener("touchend", () => {
      btn.style.background = "#3498db"; // blue
      btn.textContent = "Touch me";
      alert("You pressed the button!"); // action
    });

    // fallback for PC mouse
    btn.addEventListener("click", () => {
      alert("Clicked with mouse!");
    });
  </script>

</body>
</html>
